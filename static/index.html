<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Email Assistant</title>
  <style>
    :root {
      --bg: #0f1117;
      --panel: #171923;
      --panel-2: #1e2230;
      --text: #e8ebf3;
      --muted: #9aa3b2;
      --border: #2d3345;
      --accent: #22c55e;
      --accent-hover: #16a34a;
      --user-bubble: #214083;
      --assistant-bubble: #1c2230;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, Segoe UI, system-ui, sans-serif;
      background: radial-gradient(circle at top, #151826, var(--bg) 40%);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    .app {
      max-width: 980px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 1rem;
      gap: 0.75rem;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(23, 25, 35, 0.85);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.85rem 1rem;
      backdrop-filter: blur(8px);
    }

    .title {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 700;
    }

    .meta {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .chat {
      flex: 1;
      overflow-y: auto;
      border: 1px solid var(--border);
      background: rgba(23, 25, 35, 0.8);
      border-radius: 12px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    .message {
      max-width: 85%;
      border-radius: 12px;
      padding: 0.75rem 0.9rem;
      white-space: pre-wrap;
      line-height: 1.45;
      border: 1px solid var(--border);
    }

    .message.user {
      align-self: flex-end;
      background: var(--user-bubble);
      border-color: #3158af;
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--assistant-bubble);
    }

    .composer {
      border: 1px solid var(--border);
      background: rgba(23, 25, 35, 0.95);
      border-radius: 12px;
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    textarea {
      width: 100%;
      min-height: 88px;
      resize: vertical;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      padding: 0.75rem;
      font: inherit;
      outline: none;
    }

    textarea:focus {
      border-color: #4b78de;
      box-shadow: 0 0 0 2px rgba(75, 120, 222, 0.2);
    }

    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .left-actions,
    .right-actions {
      display: flex;
      gap: 0.5rem;
    }

    button {
      border: 1px solid var(--border);
      background: #252b3b;
      color: var(--text);
      border-radius: 10px;
      padding: 0.5rem 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: #2d3448;
    }

    .primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #07120a;
    }

    .primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .disclaimer {
      font-size: 0.78rem;
      color: var(--muted);
      margin: 0;
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="header">
      <h1 class="title">AI Email Assistant</h1>
      <div class="meta" id="cacheMeta">Last updated: —</div>
    </header>

    <main class="chat" id="chat">
      <div class="message assistant">
        Ask me anything about your latest emails.
      </div>
    </main>

    <section class="composer">
      <textarea id="q"
        placeholder="Ask for summary, sender-specific updates, or today's important emails..."></textarea>
      <div class="actions">
        <div class="left-actions">
          <button class="primary" id="send">Send</button>
          <button id="refresh">Refresh emails</button>
        </div>
        <div class="right-actions">
          <button id="clear">Clear chat</button>
        </div>
      </div>
      <p class="disclaimer">
        Replies use the email batch loaded from the server, not full mailbox history.
      </p>
    </section>
  </div>
  <script>
    const chat = document.getElementById("chat");
    const q = document.getElementById("q");
    const send = document.getElementById("send");
    const refresh = document.getElementById("refresh");
    const clear = document.getElementById("clear");
    const cacheMeta = document.getElementById("cacheMeta");
    const SESSION_KEY = "mail_assistant_client_session_id";
    let clientSessionId = localStorage.getItem(SESSION_KEY);
    if (!clientSessionId) {
      clientSessionId = "sess_" + Math.random().toString(36).slice(2, 14);
      localStorage.setItem(SESSION_KEY, clientSessionId);
    }
    let lastCacheAgeBase = null;
    let lastUiTick = null;

    function setCacheLine(ageSeconds) {
      lastCacheAgeBase = ageSeconds;
      lastUiTick = Date.now();
      const secs = Math.round(ageSeconds);
      cacheMeta.textContent = "Last updated: " + secs + " second" + (secs === 1 ? "" : "s") + " ago";
    }

    setInterval(() => {
      if (lastCacheAgeBase == null || lastUiTick == null) return;
      const extra = (Date.now() - lastUiTick) / 1000;
      const total = lastCacheAgeBase + extra;
      const secs = Math.round(total);
      cacheMeta.textContent = "Last updated: " + secs + " second" + (secs === 1 ? "" : "s") + " ago";
    }, 1000);

    function pushMessage(role, text) {
      const el = document.createElement("div");
      el.className = "message " + role;
      el.textContent = text;
      chat.appendChild(el);
      chat.scrollTop = chat.scrollHeight;
      return el;
    }

    function ensureAssistantStructure(targetEl) {
      let textEl = targetEl.querySelector(".assistant-text");
      let actionsEl = targetEl.querySelector(".calendar-actions");
      if (!textEl) {
        targetEl.textContent = "";
        textEl = document.createElement("div");
        textEl.className = "assistant-text";
        targetEl.appendChild(textEl);
      }
      if (!actionsEl) {
        actionsEl = document.createElement("div");
        actionsEl.className = "calendar-actions";
        actionsEl.style.marginTop = "10px";
        targetEl.appendChild(actionsEl);
      }
      return { textEl, actionsEl };
    }

    function setAssistantMessage(targetEl, messageText, staleNote) {
      const { textEl, actionsEl } = ensureAssistantStructure(targetEl);
      actionsEl.innerHTML = "";
      textEl.textContent = messageText || "";
      if (staleNote) {
        const note = document.createElement("span");
        note.textContent = "\n\n(note: served from cached emails; live email API may be unavailable)";
        textEl.appendChild(note);
      }
    }

    async function sendCalendarAction(action, proposalId) {
      send.disabled = true;
      refresh.disabled = true;
      clear.disabled = true;
      const pending = pushMessage("assistant", "Scheduling...");
      try {
        const res = await fetch("/ai/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            query: action === "approve" ? "approve" : "dismiss",
            force_refresh: false,
            client_session_id: clientSessionId,
            calendar_action: action,
            calendar_proposal_id: proposalId,
          }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          setAssistantMessage(
            pending,
            (data.error || data.detail || res.statusText) +
            (data.request_id ? "\n\nrequest_id: " + data.request_id : ""),
            false,
          );
          return;
        }
        setAssistantMessage(pending, data.response || "", false);
      } catch (e) {
        setAssistantMessage(pending, "Network error: " + e, false);
      } finally {
        send.disabled = false;
        refresh.disabled = false;
        clear.disabled = false;
      }
    }

    function renderCalendarProposalButtons(targetEl, proposals) {
      const { actionsEl } = ensureAssistantStructure(targetEl);
      actionsEl.innerHTML = "";
      if (!Array.isArray(proposals) || proposals.length === 0) return;
      const wrap = document.createElement("div");
      wrap.style.display = "flex";
      wrap.style.flexDirection = "column";
      wrap.style.gap = "8px";

      const title = document.createElement("div");
      title.style.fontSize = "12px";
      title.style.color = "var(--muted)";
      title.textContent = "Calendar proposals";
      wrap.appendChild(title);

      proposals.forEach((p) => {
        const row = document.createElement("div");
        row.style.border = "1px solid var(--border)";
        row.style.borderRadius = "10px";
        row.style.padding = "8px";
        row.style.background = "var(--panel-2)";

        const text = document.createElement("div");
        text.style.fontSize = "13px";
        text.style.marginBottom = "8px";
        const conf = Math.round((p.confidence || 0) * 100);
        text.textContent = `${p.title} • ${p.start_local_display} (${p.timezone}) • confidence ${conf}%`;
        row.appendChild(text);

        const btns = document.createElement("div");
        btns.style.display = "flex";
        btns.style.gap = "8px";

        const approve = document.createElement("button");
        approve.textContent = "Add to Calendar";
        approve.className = "primary";
        approve.onclick = () => sendCalendarAction("approve", p.proposal_id);

        const dismiss = document.createElement("button");
        dismiss.textContent = "Ignore";
        dismiss.onclick = () => sendCalendarAction("dismiss", p.proposal_id);

        btns.appendChild(approve);
        btns.appendChild(dismiss);
        row.appendChild(btns);
        wrap.appendChild(row);
      });

      actionsEl.appendChild(wrap);
    }

    async function doChat(forceRefresh) {
      const query = q.value.trim();
      if (!query) {
        pushMessage("assistant", "Enter a question first.");
        return;
      }
      pushMessage("user", query);
      q.value = "";
      send.disabled = true;
      refresh.disabled = true;
      clear.disabled = true;
      const pending = pushMessage("assistant", "Thinking...");
      try {
        const res = await fetch("/ai/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            query,
            force_refresh: !!forceRefresh,
            client_session_id: clientSessionId,
          }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          setAssistantMessage(
            pending,
            (data.error || data.detail || res.statusText) +
            (data.request_id ? "\n\nrequest_id: " + data.request_id : ""),
            false,
          );
          return;
        }
        setAssistantMessage(pending, data.response || "", Boolean(data.stale));
        renderCalendarProposalButtons(pending, data.calendar_proposals);
        if (typeof data.cache_age_s === "number") {
          setCacheLine(data.cache_age_s);
        }
      } catch (e) {
        setAssistantMessage(pending, "Network error: " + e, false);
      } finally {
        send.disabled = false;
        refresh.disabled = false;
        clear.disabled = false;
      }
    }

    send.addEventListener("click", () => doChat(false));
    refresh.addEventListener("click", () => doChat(true));
    clear.addEventListener("click", () => {
      chat.innerHTML = "";
      pushMessage("assistant", "Chat cleared. Ask a new question any time.");
    });
    q.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) {
        doChat(false);
      }
    });
  </script>
</body>

</html>
